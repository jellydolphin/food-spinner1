<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>今天吃啥 · 华农</title>
<style>
@import url('https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap');

:root {
  --blue:   #7B9CE0;
  --pink:   #E292A8;
  --purple: #B892D0;
  --blue-light:  #D0DCF8;
  --pink-light:  #F8DCE4;
  --text:        #2D2D2D;
  --text-mid:    #5C5C5C;
  --text-light:  #949494;
  --white:       #FFFFFF;
  --radius-lg:   24px;
  --radius-md:   16px;
  --radius-sm:   12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%,  rgba(160,190,240,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 30%, rgba(230,160,180,0.30) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(190,160,220,0.25) 0%, transparent 50%),
    linear-gradient(175deg, #EFF3FB 0%, #F5EEF4 40%, #FDF0F3 100%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 40px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
  overflow-x: hidden;
}

/* Decorative floating blobs */
body::before {
  content: '';
  position: fixed; top: -120px; right: -80px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(160,190,240,0.2) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; bottom: 10%; left: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(230,160,180,0.18) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}

/* ===== Glass Card Mixin ===== */
.glass {
  background: rgba(255,255,255,0.58);
  backdrop-filter: blur(24px) saturate(130%);
  -webkit-backdrop-filter: blur(24px) saturate(130%);
  border: 1px solid rgba(255,255,255,0.55);
  box-shadow:
    0 4px 24px rgba(120,130,170,0.08),
    0 1px 4px rgba(120,130,170,0.05),
    inset 0 1px 0 rgba(255,255,255,0.7);
}

.glass-heavy {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(30px) saturate(150%);
  -webkit-backdrop-filter: blur(30px) saturate(150%);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow:
    0 8px 36px rgba(120,130,170,0.10),
    0 2px 8px rgba(120,130,170,0.06),
    inset 0 1px 1px rgba(255,255,255,0.8);
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 36px 20px 8px;
  position: relative; z-index: 1;
}
.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 600;
  letter-spacing: 1px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .sub {
  font-size: 12px; color: var(--text-light);
  margin-top: 4px; letter-spacing: 1px;
}

/* ===== Filter Card ===== */
.filter-card {
  margin: 16px 16px 12px;
  padding: 22px 20px;
  border-radius: var(--radius-lg);
  position: relative; z-index: 1;
}

.filter-step { margin-bottom: 14px; }
.filter-step:last-child { margin-bottom: 0; }
.filter-label {
  font-size: 10px; font-weight: 700;
  color: var(--text-light); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 8px;
}
.filter-pills { display: flex; flex-wrap: wrap; gap: 8px; }

.filter-pill {
  padding: 9px 18px; border-radius: 22px;
  font-size: 13px; font-weight: 500;
  border: 1px solid rgba(200,210,230,0.5);
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--text-mid);
  cursor: pointer; transition: all 0.25s;
  font-family: inherit;
}
.filter-pill:active { transform: scale(0.95); }

.filter-pill.selected {
  background: linear-gradient(135deg, rgba(123,156,224,0.85), rgba(184,146,208,0.85));
  color: #fff;
  border-color: transparent;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(123,156,224,0.25);
}
.filter-pill.selected::after { display: none; }

/* ===== Filter Summary ===== */
.filter-summary {
  display: flex; align-items: center; gap: 8px;
  margin: 0 16px 8px;
  padding: 12px 18px;
  border-radius: var(--radius-md);
  font-size: 13px; color: var(--text-mid);
  position: relative; z-index: 1;
}
.filter-summary .count {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 18px;
  background: linear-gradient(135deg, var(--blue), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 0 2px;
}
.filter-summary .reset-link {
  margin-left: auto; font-size: 11px;
  color: var(--text-light); cursor: pointer;
  background: none; border: none;
  font-family: inherit; font-weight: 500;
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
.filter-summary .reset-link:active { color: var(--blue); }

/* ===== Wheel ===== */
.wheel-section {
  position: relative;
  display: flex; justify-content: center;
  margin: 14px 0 4px;
  z-index: 1;
}
.wheel-wrapper {
  position: relative;
  width: 300px; height: 300px;
}

/* Glass circle under canvas */
.wheel-glass {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow:
    0 8px 40px rgba(120,140,180,0.10),
    0 2px 10px rgba(120,140,180,0.06),
    inset 0 1px 2px rgba(255,255,255,0.8);
}

canvas#wheelCanvas {
  position: absolute; top: 0; left: 0;
  width: 300px; height: 300px;
}

/* Pointer */
.pointer {
  position: absolute;
  top: -4px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 22px solid var(--text);
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}

/* Center button */
.center-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 15;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid rgba(123,156,224,0.3);
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; font-weight: 700;
  color: var(--blue);
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(120,140,180,0.12);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: 1px;
}
.center-btn:active { transform: translate(-50%, -50%) scale(0.92); }
.center-btn:disabled {
  color: var(--text-light); cursor: not-allowed;
  opacity: 0.5;
}

/* ===== Chips ===== */
.chips-section { padding: 0 16px; position: relative; z-index: 1; }
.chips-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.chips-header h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; font-weight: 600;
}
.chips-header button {
  background: none; border: none;
  font-size: 11px; color: var(--text-light);
  cursor: pointer; font-weight: 500;
  font-family: inherit; letter-spacing: 0.5px;
  transition: color 0.2s;
}
.chips-header button:active { color: var(--blue); }

.chips-grid { display: flex; flex-wrap: wrap; gap: 6px; }

.chip {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.25s;
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.5);
  color: var(--text);
  box-shadow: 0 1px 3px rgba(120,140,180,0.05);
}
.chip .chip-emoji { font-size: 14px; }
.chip .chip-tag {
  font-size: 9px; padding: 2px 6px; border-radius: 6px;
  font-weight: 600; letter-spacing: 0.3px;
}
.tag-canteen { background: rgba(123,156,224,0.15); color: var(--blue); }
.tag-delivery { background: rgba(226,146,168,0.12); color: var(--pink); }

.chip.excluded {
  background: rgba(255,255,255,0.2);
  color: #C8C8D0;
  text-decoration: line-through;
  border-color: transparent;
  box-shadow: none;
}
.chip.excluded .chip-tag { opacity: 0.3; }
.chip:active { transform: scale(0.95); }

/* ===== Tip ===== */
.tip {
  text-align: center;
  padding: 8px 20px 16px;
  font-size: 11px; color: var(--text-light);
  position: relative; z-index: 1; letter-spacing: 0.5px;
}

/* ===== Result Overlay ===== */
.result-overlay {
  position: fixed; inset: 0;
  background: rgba(20,20,40,0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.result-card {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(30px) saturate(150%);
  -webkit-backdrop-filter: blur(30px) saturate(150%);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--radius-lg);
  padding: 34px 28px 24px;
  width: calc(100% - 60px);
  max-width: 320px;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { from { transform: scale(0.8) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.result-card .result-emoji { font-size: 48px; margin-bottom: 12px; }
.result-card .result-label {
  font-size: 10px; color: var(--text-light);
  letter-spacing: 2px; text-transform: uppercase;
}
.result-card .result-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 21px; font-weight: 700;
  margin: 6px 0 4px;
}
.result-card .result-meta { font-size: 12px; color: var(--text-mid); margin-bottom: 10px; }
.result-card .result-tag {
  display: inline-block; font-size: 10px;
  padding: 4px 12px; border-radius: 12px;
  font-weight: 600; margin: 2px 4px;
  letter-spacing: 0.5px;
}
.result-card .btn-row {
  display: flex; gap: 10px; margin-top: 20px;
}
.result-card .btn-row button {
  flex: 1; padding: 12px; border-radius: var(--radius-sm);
  border: none; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.25s; letter-spacing: 0.5px;
}
.btn-retry {
  background: rgba(200,210,230,0.4);
  backdrop-filter: blur(8px);
  color: var(--blue);
  border: 1px solid rgba(123,156,224,0.2) !important;
}
.btn-retry:active { background: rgba(180,195,225,0.5); }
.btn-confirm {
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #fff;
  box-shadow: 0 4px 16px rgba(123,156,224,0.3);
}
.btn-confirm:active { opacity: 0.85; transform: scale(0.97); }

/* ===== States ===== */
.hidden { display: none !important; }
.empty-state {
  text-align: center;
  padding: 36px 20px;
  color: var(--text-light);
  font-size: 14px; line-height: 1.6;
  position: relative; z-index: 1;
}
.empty-state .big-emoji { font-size: 36px; margin-bottom: 10px; }

/* Step indicator */
.step-row { display: flex; gap: 6px; margin-bottom: 16px; }
.step-dot {
  flex: 1; height: 2px; border-radius: 2px;
  background: rgba(180,190,210,0.3);
  transition: background 0.4s;
}
.step-dot.done { background: linear-gradient(90deg, var(--blue), var(--purple)); }

/* Shake */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  50% { transform: translateX(3px); }
  75% { transform: translateX(-3px); }
}
</style>
</head>
<body>

<div class="header">
  <h1>今天吃啥</h1>
  <div class="sub">先筛选 · 再转盘 · 华中农业大学</div>
</div>

<!-- ===== FILTER ===== -->
<div class="filter-card glass-heavy" id="filterCard">
  <div class="step-row">
    <div class="step-dot done" id="stepDot1"></div>
    <div class="step-dot" id="stepDot2"></div>
    <div class="step-dot" id="stepDot3"></div>
  </div>

  <div class="filter-step">
    <div class="filter-label">饮食模式</div>
    <div class="filter-pills" id="dietPills"></div>
  </div>

  <div class="filter-step">
    <div class="filter-label">来源</div>
    <div class="filter-pills" id="sourcePills"></div>
  </div>

  <div class="filter-step">
    <div class="filter-label">种类</div>
    <div class="filter-pills" id="typePills"></div>
  </div>
</div>

<!-- ===== SUMMARY ===== -->
<div class="filter-summary glass" id="filterSummary">
  <span>筛选出</span>
  <span class="count" id="filterCount">0</span>
  <span>个选项</span>
  <button class="reset-link" onclick="resetFilters()">重置</button>
</div>

<!-- ===== WHEEL ===== -->
<div class="wheel-section" id="wheelSection">
  <div class="wheel-wrapper" id="wheelWrapper">
    <div class="wheel-glass"></div>
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
    <div class="pointer"></div>
    <button class="center-btn" id="spinBtn" onclick="startSpin()">开转</button>
  </div>
</div>

<!-- ===== EMPTY / SINGLE STATES ===== -->
<div class="empty-state hidden" id="emptyState">
  <div class="big-emoji">🤔</div>
  <p>没有匹配的选项</p>
  <p style="font-size:12px;">试试放宽筛选条件</p>
</div>

<div class="empty-state hidden" id="singleState">
  <div class="big-emoji" id="singleEmoji"></div>
  <p style="font-weight:600;" id="singleName"></p>
  <p style="font-size:12px;">只剩这一个，不用转了</p>
</div>

<!-- ===== CHIPS ===== -->
<div class="chips-section" id="chipsSection">
  <div class="chips-header">
    <h2>可选选项</h2>
    <button onclick="resetExcluded()">恢复全部</button>
  </div>
  <div class="chips-grid" id="chipsGrid"></div>
</div>

<div class="tip" id="tipText"></div>

<p style="text-align:center;font-size:10px;color:var(--text-light);padding:0 20px 20px;position:relative;z-index:1;">
  数据来源 <a href="https://docs.qq.com/sheet/DUEVoZ1ZJRHpVS0Vw?tab=BB08J2" target="_blank" style="color:var(--blue);text-decoration:none;">腾讯文档 · 我在华农今天吃什么</a>
  · <span id="syncTime">加载中…</span>
  <button onclick="manualRefresh()" style="background:none;border:none;color:var(--blue);font-size:10px;cursor:pointer;font-family:inherit;">↻ 检查更新</button>
</p>

<!-- ===== RESULT ===== -->
<div class="result-overlay hidden" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-label">转盘选择了</div>
    <div class="result-name" id="resultName"></div>
    <div class="result-meta" id="resultMeta"></div>
    <div id="resultTags"></div>
    <p class="result-note hidden" id="resultNote" style="font-size:12px;color:var(--text-mid);line-height:1.6;background:rgba(255,255,255,0.5);border-radius:10px;padding:10px 14px;margin-top:12px;text-align:left;"></p>
    <div class="btn-row">
      <button class="btn-retry" onclick="closeResult()">再转一次</button>
      <button class="btn-confirm" onclick="confirmResult()">就吃这个</button>
    </div>
  </div>
</div>

<script>

    '汉堡/三明治':'🍔','无主食':'🥬','饼/馍':'🫓','饺子/馄饨':'🥟'
  };
  return map[type] || '🍽️';
}

  { id:'a30',name:'肉丝鸡蛋炒饭', emoji:'🍚', source:'荟园', type:'饭', diet:'normal', note:'荟一，可以用老干妈酱炒，有银耳或者粥送' },
  { id:'a31',name:'肠粉', emoji:'🫓', source:'荟园', type:'饼/馍', diet:'normal', note:'' },

// ==================== FILTER OPTIONS ====================
const DIET_OPTIONS = [
  { key:'normal', label:'正常吃', icon:'🍔' },
  { key:'diet',   label:'减脂餐', icon:'🥗' },
];
const SOURCE_OPTIONS = [
  { key:'桃园', label:'桃园' },
  { key:'荟园', label:'荟园' },
  { key:'荟园小站', label:'荟园小站' },
  { key:'竹苑', label:'竹苑' },
  { key:'外卖', label:'外卖' },
  { key:'西苑', label:'西苑' },
  { key:'步行街', label:'步行街' },
  { key:'橘园', label:'橘园' },
];
const TYPE_OPTIONS = [
  { key:'粗粮', label:'粗粮' },
  { key:'饭', label:'饭' },
  { key:'轻食', label:'轻食' },
  { key:'粉', label:'粉' },
  { key:'面', label:'面' },
  { key:'汉堡/三明治', label:'汉堡' },
  { key:'无主食', label:'无主食' },
  { key:'饼/馍', label:'饼/馍' },
  { key:'饺子/馄饨', label:'饺子/馄饨' },
];

// ==================== STATE ====================
let filterDiet = 'normal';
let filterSources = new Set(['桃园','荟园','荟园小站','竹苑','外卖','西苑','步行街','橘园']);
let filterTypes = new Set(['粗粮','饭','轻食','粉','面','汉堡/三明治','无主食','饼/馍','饺子/馄饨']);
let excludedIds = new Set();
let rotation = 0;
let spinning = false;
let animFrame = null;

// ==================== FILTERING ====================
function getFiltered() {
  return ALL_FOODS.filter(f => {
    if (filterDiet === 'normal' && f.diet === 'diet') return false;
    if (filterDiet === 'diet' && f.diet === 'normal') return false;
    if (!filterSources.has(f.source)) return false;
    if (!filterTypes.has(f.type)) return false;
    return true;
  });
}
function getActive() { return getFiltered().filter(f => !excludedIds.has(f.id)); }

// ==================== CANVAS ====================
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const SIZE = 600, CX = SIZE / 2, CY = SIZE / 2;
const R = 270;

function drawWheel() {
  const active = getActive();
  const n = active.length;
  ctx.clearRect(0, 0, SIZE, SIZE);

  if (n === 0) return;
  const sa = (2 * Math.PI) / n;

  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(rotation);

  // Alternating fills — subtle blue-pink tint per sector
  for (let i = 0; i < n; i++) {
    const start = i * sa - Math.PI / 2;
    const end = start + sa;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, start, end);
    ctx.closePath();

    if (n <= 6) {
      // Few options: slightly visible alternating
      ctx.fillStyle = i % 2 === 0
        ? 'rgba(255,255,255,0.20)'
        : 'rgba(180,200,230,0.10)';
    } else {
      // Many options: barely there
      ctx.fillStyle = i % 2 === 0
        ? 'rgba(255,255,255,0.12)'
        : 'rgba(200,180,210,0.06)';
    }
    ctx.fill();
  }

  // Dividing lines
  for (let i = 0; i < n; i++) {
    const angle = i * sa - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(22, 0); // start from inner ring edge
    ctx.lineTo(R * Math.cos(angle), R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Small dots at outer edge of each sector boundary
  for (let i = 0; i < n; i++) {
    const angle = i * sa - Math.PI / 2;
    const dx = (R - 10) * Math.cos(angle);
    const dy = (R - 10) * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(dx, dy, 3.5, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner ring
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

// ==================== UI ====================
function renderFilters() {
  document.getElementById('dietPills').innerHTML = DIET_OPTIONS.map(o =>
    `<span class="filter-pill${filterDiet===o.key?' selected':''}" onclick="setDiet('${o.key}')">${o.icon} ${o.label}</span>`
  ).join('');
  document.getElementById('sourcePills').innerHTML = SOURCE_OPTIONS.map(o =>
    `<span class="filter-pill${filterSources.has(o.key)?' selected':''}" onclick="toggleSource('${o.key}')">${o.label}</span>`
  ).join('');
  document.getElementById('typePills').innerHTML = TYPE_OPTIONS.map(o =>
    `<span class="filter-pill${filterTypes.has(o.key)?' selected':''}" onclick="toggleType('${o.key}')">${o.label}</span>`
  ).join('');
  document.getElementById('stepDot2').classList.toggle('done', filterSources.size > 0);
  document.getElementById('stepDot3').classList.toggle('done', filterTypes.size > 0);
}

function renderSummary() {
  const filtered = getFiltered();
  const active = getActive();
  document.getElementById('filterCount').textContent = active.length;

  const wheelS = document.getElementById('wheelSection');
  const emptyS = document.getElementById('emptyState');
  const singleS = document.getElementById('singleState');
  const chipsS = document.getElementById('chipsSection');

  if (filtered.length === 0) {
    wheelS.classList.add('hidden'); emptyS.classList.remove('hidden');
    singleS.classList.add('hidden'); chipsS.classList.add('hidden');
  } else if (active.length === 0) {
    wheelS.classList.add('hidden'); emptyS.classList.remove('hidden');
    emptyS.querySelector('p').textContent = '选项都被剔除了';
    singleS.classList.add('hidden'); chipsS.classList.remove('hidden');
  } else if (active.length === 1) {
    wheelS.classList.add('hidden'); emptyS.classList.add('hidden');
    singleS.classList.remove('hidden');
    document.getElementById('singleEmoji').textContent = active[0].emoji;
    document.getElementById('singleName').textContent = active[0].name;
    chipsS.classList.remove('hidden');
  } else {
    wheelS.classList.remove('hidden'); emptyS.classList.add('hidden');
    singleS.classList.add('hidden'); chipsS.classList.remove('hidden');
  }

  renderChips(); updateTip(); drawWheel();
}

function renderChips() {
  const filtered = getFiltered();
  document.getElementById('chipsGrid').innerHTML = filtered.map(f => {
    const isEx = excludedIds.has(f.id);
    return `<div class="chip${isEx?' excluded':''}" onclick="toggleExclude('${f.id}')">
      <span class="chip-emoji">${f.emoji}</span>${f.name}
      <span class="chip-tag ${f.source==='食堂'?'tag-canteen':'tag-delivery'}">${f.source}</span>
    </div>`;
  }).join('');
}

function updateTip() {
  const active = getActive();
  const tip = document.getElementById('tipText');
  if (active.length <= 1) { tip.textContent = ''; return; }
  tip.textContent = active.length === getFiltered().length
    ? '点击选项剔除不想要的，然后转盘决定'
    : `已剔除 ${excludedIds.size} 个，剩余 ${active.length} 个可选`;
}

// ==================== ACTIONS ====================
function setDiet(k) { filterDiet = k; excludedIds.clear(); refreshAll(); }
function toggleSource(k) {
  if (filterSources.has(k) && filterSources.size <= 1) return;
  filterSources.has(k) ? filterSources.delete(k) : filterSources.add(k);
  excludedIds.clear(); refreshAll();
}
function toggleType(k) {
  if (filterTypes.has(k) && filterTypes.size <= 1) return;
  filterTypes.has(k) ? filterTypes.delete(k) : filterTypes.add(k);
  excludedIds.clear(); refreshAll();
}
function resetFilters() { if(spinning) return;
  filterDiet='normal'; filterSources=new Set(['桃园','荟园','荟园小站','竹苑','外卖','西苑','步行街','橘园']);
  filterTypes=new Set(['粗粮','饭','轻食','粉','面','汉堡/三明治','无主食','饼/馍','饺子/馄饨']);
  excludedIds.clear(); refreshAll();
}
function toggleExclude(id) { if(spinning) return;
  const active = getActive();
  if (excludedIds.has(id)) { excludedIds.delete(id); }
  else {
    if (active.length <= 2) {
      document.querySelectorAll('.chip').forEach(c => {
        if (c.textContent.includes(ALL_FOODS.find(f=>f.id===id)?.name||'')) {
          c.style.animation='shake .4s ease'; setTimeout(()=>c.style.animation='',400);
        }
      }); return;
    }
    excludedIds.add(id);
  }
  renderSummary();
}
function resetExcluded() { if(spinning) return; excludedIds.clear(); refreshAll(); }
function refreshAll() { renderFilters(); renderSummary(); }

// ==================== SPIN ====================
function startSpin() {
  if (spinning) return;
  const active = getActive();
  if (active.length < 2) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true; btn.textContent = '···';

  const winIdx = Math.floor(Math.random() * active.length);
  const n = active.length;
  const sa = (2 * Math.PI) / n;
  const mid = (winIdx + 0.5) * sa;
  let tb = (-Math.PI / 2 - mid) % (2 * Math.PI);
  if (tb < 0) tb += 2 * Math.PI;
  const cm = ((rotation % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  const adj = ((tb - cm + 2*Math.PI) % (2*Math.PI));
  const spins = (3 + Math.floor(Math.random() * 2)) * 2 * Math.PI;
  const target = rotation + spins + adj;

  const sr = rotation;
  const st = performance.now();
  const dur = 1500;

  function anim(now) {
    const t = Math.min(1, (now - st) / dur);
    const e = 1 - Math.pow(1 - t, 3);
    rotation = sr + (target - sr) * e;
    drawWheel();
    if (t < 1) { animFrame = requestAnimationFrame(anim); }
    else {
      rotation = target; drawWheel();
      spinning = false; btn.disabled = false; btn.textContent = '开转';
      showResult(active[winIdx]);
    }
  }
  animFrame = requestAnimationFrame(anim);
}

// ==================== RESULT ====================
function showResult(food) {
  document.getElementById('resultEmoji').textContent = food.emoji;
  document.getElementById('resultName').textContent = food.name;
  document.getElementById('resultMeta').textContent = food.source + ' · ' + food.type;
  document.getElementById('resultTags').innerHTML = `
    <span class="result-tag tag-${food.source==='食堂'?'canteen':'delivery'}" style="background:rgba(123,156,224,0.12);color:#7B9CE0;">🏫 ${food.source}</span>
    <span class="result-tag tag-canteen" style="background:rgba(226,146,168,0.12);color:#E292A8;">${food.type}</span>`;
  // Show note if exists
  const noteEl = document.getElementById('resultNote');
  if (food.note && food.note.trim()) {
    noteEl.textContent = '💡 ' + food.note;
    noteEl.classList.remove('hidden');
  } else {
    noteEl.classList.add('hidden');
  }
  document.getElementById('resultOverlay').classList.remove('hidden');
}
function closeResult() {
  document.getElementById('resultOverlay').classList.add('hidden');
  rotation += (Math.random() - 0.5) * 0.5;
  drawWheel();
}
function confirmResult() {
  document.getElementById('resultOverlay').classList.add('hidden');
}

// ==================== DATA SYNC ====================
const SHEET_URL = 'https://docs.qq.com/sheet/DUEVoZ1ZJRHpVS0Vw?tab=BB08J2';
const SYNC_INTERVAL = 5 * 60 * 1000; // 5 minutes
let lastSyncTime = null;

function formatTime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function checkForUpdates() {
  try {
    const resp = await fetch('data.json?v=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('not found');
    const json = await resp.json();
    if (json.updated && json.foods && json.foods.length > 0) {
      const newFoods = json.foods;
      const changed = JSON.stringify(newFoods) !== JSON.stringify(ALL_FOODS);
      if (changed) {
        // Data has changed - update
        ALL_FOODS.length = 0;
        newFoods.forEach(f => ALL_FOODS.push(f));
        lastSyncTime = json.updated;
        excludedIds.clear();
        refreshAll();
        showToast(`已更新 ${newFoods.length} 条菜品数据`);
        console.log('Data synced at', formatTime(lastSyncTime));
      } else {
        lastSyncTime = json.updated || lastSyncTime;
      }
    }
  } catch(e) {
    if (!lastSyncTime) lastSyncTime = Date.now();
  }
  document.getElementById('syncTime').textContent = lastSyncTime
    ? '更新于 ' + formatTime(lastSyncTime)
    : '使用离线数据';
}

function manualRefresh() {
  document.getElementById('syncTime').textContent = '检查中…';
  checkForUpdates().then(() => {
    if (lastSyncTime) {
      const ts = formatTime(lastSyncTime);
      document.getElementById('syncTime').textContent = '更新于 ' + ts;
    }
  });
}

// Toast notification
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(45,45,45,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.15);';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

// Poll for updates every hour
setInterval(checkForUpdates, SYNC_INTERVAL);

// ==================== INIT ====================
function init() {
  renderFilters();
  renderSummary();
  drawWheel();
  checkForUpdates();
}
init();
</script>
